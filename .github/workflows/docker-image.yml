name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:18.09-dind
        options: --privileged
        ports:
          - 2375:2375
        env:
          DOCKER_TLS_CERTDIR: ""

    steps:
      - uses: actions/checkout@v4

      # 删除本地 Docker 配置，避免 TLS/ca.pem 错误
      - name: Clean Docker config
        run: rm -rf ~/.docker

      # 设置 Docker client 指向 DIND 服务，禁用 TLS
      - name: Setup Docker client
        run: |
          echo "DOCKER_HOST=tcp://docker:2375" >> $GITHUB_ENV
          unset DOCKER_TLS_VERIFY
          unset DOCKER_CERT_PATH

      - name: Verify Docker version
        run: |
          docker version
          docker info

      - name: Build Docker image
        run: docker build -t vllm-cu118:latest .

      - name: Save Docker image as artifact
        run: docker save -o vllm-cu118.tar vllm-cu118:latest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: vllm-cu118.tar
