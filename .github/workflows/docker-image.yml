name: Docker 18.09 Build CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:20.04
      options: --privileged

    steps:
      - name: Install base tools
        run: |
          apt-get update
          apt-get install -y curl xz-utils iptables ca-certificates

      - name: Install Docker 18.09 (static binary)
        run: |
          curl -L https://download.docker.com/linux/static/stable/x86_64/docker-18.09.9.tgz -o docker.tgz
          tar -xzf docker.tgz
          cp docker/* /usr/bin/

      - name: Start Docker daemon
        run: |
          dockerd > /tmp/dockerd.log 2>&1 &
          sleep 8

      - name: Verify Docker version
        run: docker version

      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          export DOCKER_BUILDKIT=0
          docker build --network=host -t vllm-cu118:latest .

      - name: Save Docker image
        run: |
          mkdir -p artifacts
          docker save vllm-cu118:latest -o artifacts/vllm-cu118.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: artifacts/vllm-cu118.tar