name: Docker 18.09 Build CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Docker v19.03.9
        uses: docker/setup-docker-action@v5.0.0
        with:
          version: v19.03.9

      - name: 检查 Docker 版本
        run: docker version

      # 构建 Docker 镜像
      - name: Build Docker image
        run: |
          docker build -t vllm-cu118:latest .

      # 保存镜像为 artifact
      - name: Save Docker image
        run: |
          mkdir -p artifacts
          docker save -o artifacts/vllm-cu118.tar vllm-cu118:latest

      # 上传 artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: artifacts/vllm-cu118.tar
