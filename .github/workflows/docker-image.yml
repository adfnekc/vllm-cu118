name: Docker 18.09 Build CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-20.04  # 可以用新版 runner

    steps:
      - uses: actions/checkout@v4

      # 安装依赖
      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            apt-transport-https \
            ca-certificates \
            curl \
            gnupg-agent \
            software-properties-common

      # 安装 Docker 18.09
      - name: Install Docker 18.09
        run: |
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -
          sudo add-apt-repository \
            "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
          sudo apt-get update
          sudo apt-get install -y docker-ce=18.09.9~3-0~ubuntu-$(lsb_release -cs) \
                                  docker-ce-cli=18.09.9~3-0~ubuntu-$(lsb_release -cs) \
                                  containerd.io
          docker version

      # 确保当前用户可以运行 docker
      - name: Setup docker permissions
        run: |
          sudo usermod -aG docker $USER
          newgrp docker

      # 构建 Docker 镜像
      - name: Build Docker image
        run: |
          docker build -t vllm-cu118:latest .

      # 保存镜像为 artifact
      - name: Save Docker image
        run: |
          mkdir -p artifacts
          docker save -o artifacts/vllm-cu118.tar vllm-cu118:latest

      # 上传 artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: artifacts/vllm-cu118.tar