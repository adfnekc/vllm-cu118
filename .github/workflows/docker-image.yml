name: Docker 18.09 Build CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download and install Docker 18.09
        run: |
          # 下载 Docker 18.09.9 二进制 tar.gz
          curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-18.09.9.tgz -o docker-18.09.9.tgz
          tar xzvf docker-18.09.9.tgz
          sudo cp docker/* /usr/local/bin/
          rm -rf docker docker-18.09.9.tgz
          docker --version

      - name: Clean up previous Docker state
        run: |
          sudo systemctl stop docker || true
          sudo rm -f /var/run/docker.pid

      # 启动 Docker daemon
      - name: Start Docker daemon
        run: |
          sudo dockerd -H unix:///var/run/docker.sock --storage-driver=overlay2 &
          # 等待 daemon 启动
          sleep 4
          docker builder prune -f
          docker info

      # 构建 Docker 镜像
      - name: Build Docker image
        run: |
          docker build -t vllm-cu118:latest --no-cache .

      # 保存镜像为 artifact
      - name: Save Docker image
        run: |
          mkdir -p artifacts
          docker save -o artifacts/vllm-cu118.tar vllm-cu118:latest

      # 上传 artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: artifacts/vllm-cu118.tar
