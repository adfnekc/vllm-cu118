name: Docker 18.09 Build CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 使用 docker 容器启动 18.09-dind 来做 build
      - name: Run Docker 18.09 build in container
        run: |
          # 1. 创建一个临时目录存放 tar
          mkdir -p $GITHUB_WORKSPACE/artifacts

          # 2. 启动 docker:18.09-dind 容器，挂载仓库
          docker run --rm --privileged \
            -v $GITHUB_WORKSPACE:/workspace \
            -w /workspace \
            docker:18.09-dind \
            sh -c "
              # 禁用 TLS
              export DOCKER_TLS_CERTDIR=''
              
              # 构建镜像
              docker build -t vllm-cu118:latest .

              # 保存镜像到挂载目录
              docker save vllm-cu118:latest -o /workspace/artifacts/vllm-cu118.tar
            "

      # 上传 artifact
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: artifacts/vllm-cu118.tar